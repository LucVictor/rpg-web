<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RPG Web — Cliente</title>
<style>
  :root {
    --bg: #0f172a;        /* slate-900 */
    --panel: #1e293b;     /* slate-800 */
    --panel2: #334155;    /* slate-700 */
    --line: #475569;      /* slate-600 */
    --text: #e2e8f0;      /* slate-200 */
    --muted: #94a3b8;     /* slate-400 */
    --accent: #38bdf8;    /* sky-400 */
    --danger: #f87171;    /* red-400 */
    --ok: #4ade80;        /* green-400 */
    --tile: #1b2742;
    --tile2: #21304f;
    --wall: #0a1122;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 15px; margin: 0; letter-spacing: .5px; }
  header .conn { margin-left: auto; display: flex; align-items: center; gap: 12px; font-size: 12px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--danger); }
  .dot.on { background: var(--ok); }
  input, button {
    font-family: inherit; font-size: 13px;
    background: var(--panel2); color: var(--text);
    border: 1px solid var(--line); border-radius: 6px;
    padding: 6px 10px; outline: none;
  }
  input:focus { border-color: var(--accent); }
  button { cursor: pointer; transition: background .15s; }
  button:hover { background: var(--line); }
  button.primary { background: var(--accent); color: #04222f; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { filter: brightness(1.1); }

  /* layout */
  main { flex: 1; display: flex; min-height: 0; }
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 12px; }
  canvas { background: var(--wall); border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,.4); cursor: pointer; max-width: 100%; max-height: 100%; }
  aside {
    width: 300px; background: var(--panel); border-left: 1px solid var(--line);
    display: flex; flex-direction: column; min-height: 0;
  }
  .sec { border-bottom: 1px solid var(--line); padding: 10px 12px; }
  .sec h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 0 8px; }

  /* chat */
  .chat { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .chatlog { flex: 1; overflow-y: auto; font-size: 13px; line-height: 1.5; }
  .chatlog .msg { margin-bottom: 3px; word-wrap: break-word; }
  .chatlog .who { color: var(--accent); font-weight: 600; }
  .chatlog .system { color: var(--muted); font-style: italic; }
  .chatrow { display: flex; gap: 6px; margin-top: 8px; }
  .chatrow input { flex: 1; }

  /* lists */
  .list { font-size: 13px; }
  .list .row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .list .row .n { flex: 1; }
  .bar { height: 6px; border-radius: 3px; background: var(--panel2); overflow: hidden; width: 60px; }
  .bar > i { display: block; height: 100%; background: var(--ok); }
  .bar.mob > i { background: var(--danger); }
  .pill { font-size: 11px; color: var(--muted); }

  /* overlay login */
  .overlay {
    position: absolute; inset: 0; background: rgba(15,23,42,.92);
    display: flex; align-items: center; justify-content: center; z-index: 10;
  }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 26px 28px; width: 320px; text-align: center;
  }
  .card h2 { margin: 0 0 4px; }
  .card p { color: var(--muted); font-size: 13px; margin: 0 0 18px; }
  .card .field { display: flex; gap: 8px; margin-bottom: 10px; }
  .card .field input { flex: 1; }
  .card .err { color: var(--danger); font-size: 12px; min-height: 16px; }
  .help { color: var(--muted); font-size: 11px; margin-top: 8px; }
  .self { color: var(--accent); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>
<header>
  <h1>⚔️ RPG WEB</h1>
  <div class="conn">
    <input id="url" value="ws://localhost:8765" style="width:200px" />
    <button id="btnConnect">Conectar</button>
    <span class="dot" id="dot"></span>
    <span id="connTxt">offline</span>
  </div>
</header>

<main>
  <div class="stage">
    <canvas id="cv" width="600" height="440"></canvas>
    <div class="overlay" id="login">
      <div class="card">
        <h2>Entrar no jogo</h2>
        <p>Conecte ao servidor e escolha um nome.</p>
        <div class="field">
          <input id="name" placeholder="Seu nome" maxlength="16" />
          <button class="primary" id="btnLogin">Entrar</button>
        </div>
        <div class="err" id="loginErr"></div>
        <div class="help">Clique numa célula vizinha para andar.<br/>Clique num monstro adjacente para atacar.</div>
      </div>
    </div>
  </div>

  <aside>
    <div class="sec">
      <h2>Jogadores online (<span id="pcount">0</span>)</h2>
      <div class="list" id="players"></div>
    </div>
    <div class="sec">
      <h2>Monstros</h2>
      <div class="list" id="monsters"></div>
    </div>
    <div class="sec">
      <h2>Inventário</h2>
      <div class="list" id="inv"></div>
    </div>
    <div class="sec chat">
      <h2>Chat</h2>
      <div class="chatlog" id="chatlog"></div>
      <div class="chatrow">
        <input id="chatInput" placeholder="Mensagem..." maxlength="200" />
        <button id="btnSay">Enviar</button>
      </div>
    </div>
  </aside>
</main>

<script>
"use strict";

// ============================================================
//  Estado do cliente. O servidor é autoritativo — aqui só
//  guardamos o que ele nos manda e desenhamos.
// ============================================================
const State = {
  ws: null,
  myId: null,
  map: null,             // { w, h, tiles }
  players: new Map(),    // id -> {id,name,x,y,dir,hp,max_hp}
  monsters: new Map(),   // id -> {id,name,x,y,hp,max_hp}
  inventory: [],
  tile: 40,              // tamanho da célula em px (recalculado ao receber o mapa)
};

// ---- elementos ----
const $ = (id) => document.getElementById(id);
const cv = $("cv"), ctx = cv.getContext("2d");

// ============================================================
//  Conexão WebSocket
// ============================================================
function connect() {
  const url = $("url").value.trim();
  if (State.ws) { try { State.ws.close(); } catch(e){} }
  setConn(false, "conectando...");
  const ws = new WebSocket(url);
  State.ws = ws;

  ws.onopen = () => { setConn(true, "online"); sysMsg("Conectado ao servidor."); };
  ws.onclose = () => { setConn(false, "offline"); sysMsg("Conexão encerrada."); showLogin(); };
  ws.onerror = () => { sysMsg("Erro de conexão. O servidor está rodando?"); };
  ws.onmessage = (ev) => {
    let m;
    try { m = JSON.parse(ev.data); } catch(e){ console.warn("JSON inválido:", ev.data); return; }
    handle(m);
  };
}

// envia { t, d } como JSON
function send(t, d = {}) {
  if (!State.ws || State.ws.readyState !== WebSocket.OPEN) return;
  State.ws.send(JSON.stringify({ t, d }));
}

function setConn(on, txt) {
  $("dot").classList.toggle("on", !!on);
  $("connTxt").textContent = txt;
}

// ============================================================
//  Dispatch de mensagens do servidor (ver PROTOCOLO.md §4)
// ============================================================
function handle(m) {
  const d = m.d || {};
  switch (m.t) {
    case "welcome":
      State.myId = d.your_id;
      State.map = d.map;
      fitCanvas();
      draw();
      break;

    case "login_ok":
      State.myId = d.id; // <-- importante

      State.players.set(d.id, { ...d });
      State.inventory = d.inventory || [];

      hideLogin();
      renderInv();
      renderPlayers();
      draw();
      break;

    case "login_err":
      $("loginErr").textContent = d.reason || "Login recusado";
      break;

    case "players":
      State.players.clear();
      (d.players || []).forEach(p => State.players.set(p.id, p));
      renderPlayers(); draw();
      break;

    case "player_joined":
      State.players.set(d.id, d);
      renderPlayers(); draw();
      break;

    case "player_left":
      State.players.delete(d.id);
      renderPlayers(); draw();
      break;

    case "moved": {
      const p = State.players.get(d.id);
      if (p) { p.x = d.x; p.y = d.y; p.dir = d.dir; }
      draw();
      break;
    }

    case "chat":
      chatMsg(d);
      break;

    case "monsters":
      State.monsters.clear();
      (d.monsters || []).forEach(mm => State.monsters.set(mm.id, mm));
      renderMonsters(); draw();
      break;

    case "combat": {
      const t = d.target_kind === "monster" ? State.monsters.get(d.target) : State.players.get(d.target);
      if (t) t.hp = d.target_hp;
      floatText(t, "-" + d.damage, "#f87171");
      d.target_kind === "monster" ? renderMonsters() : renderPlayers();
      draw();
      break;
    }

    case "monster_died":
      State.monsters.delete(d.id);
      renderMonsters(); draw();
      break;

    case "inventory":
      State.inventory = d.inventory || [];
      renderInv();
      break;

    case "hp": {
      const p = State.players.get(d.id);
      if (p) { p.hp = d.hp; p.max_hp = d.max_hp; }
      renderPlayers(); draw();
      break;
    }

    case "error":
      sysMsg("Erro: " + (d.reason || "desconhecido"));
      break;

    case "pong": break;

    default:
      console.log("Mensagem não tratada:", m.t, d);
  }
}

// ============================================================
//  Ações do jogador (cliente → servidor)
// ============================================================
function doLogin() {
  const name = $("name").value.trim();
  if (!name) { $("loginErr").textContent = "Digite um nome"; return; }
  if (!State.ws || State.ws.readyState !== WebSocket.OPEN) { $("loginErr").textContent = "Conecte ao servidor primeiro"; return; }
  send("login", { name });
}

// clique no canvas: anda (célula vizinha) ou ataca (monstro adjacente)
cv.addEventListener("click", (e) => {
  if (!State.map || !State.myId) return;
  const me = State.players.get(State.myId);
  if (!me) return;
  const rect = cv.getBoundingClientRect();
  const cx = Math.floor((e.clientX - rect.left) / State.tile);
  const cy = Math.floor((e.clientY - rect.top) / State.tile);
  if (cx < 0 || cy < 0 || cx >= State.map.w || cy >= State.map.h) return;

  // monstro nessa célula e adjacente? ataca.
  const mob = [...State.monsters.values()].find(mm => mm.x === cx && mm.y === cy);
  if (mob) {
    if (cheby(me.x, me.y, cx, cy) <= 1) send("attack", { id: mob.id });
    else sysMsg("Chegue mais perto para atacar.");
    return;
  }
  // senão, pede movimento (servidor valida adjacência)
  send("move", { x: cx, y: cy });
});

function doSay() {
  const text = $("chatInput").value.trim();
  if (!text) return;
  send("say", { text });
  $("chatInput").value = "";
}

function useItem(id) { send("use_item", { id }); }

// ============================================================
//  Render do grid (canvas)
// ============================================================
function fitCanvas() {
  const maxW = Math.min(window.innerWidth - 360, 760);
  const maxH = window.innerHeight - 110;
  const t = Math.floor(Math.min(maxW / State.map.w, maxH / State.map.h));
  State.tile = Math.max(24, t);
  cv.width = State.map.w * State.tile;
  cv.height = State.map.h * State.tile;
}

function draw() {
  if (!State.map) return;
  const t = State.tile;
  ctx.clearRect(0, 0, cv.width, cv.height);

  // tiles
  for (let y = 0; y < State.map.h; y++) {
    for (let x = 0; x < State.map.w; x++) {
      const blocked = State.map.tiles[y][x] === 1;
      ctx.fillStyle = blocked ? getCss("--wall") : ((x + y) % 2 ? getCss("--tile") : getCss("--tile2"));
      ctx.fillRect(x*t, y*t, t, t);
      ctx.strokeStyle = "rgba(255,255,255,.04)";
      ctx.strokeRect(x*t, y*t, t, t);
    }
  }

  // monstros
  for (const mm of State.monsters.values()) drawEntity(mm, "#ef4444", "🟢", true);
  // jogadores
  for (const p of State.players.values()) drawEntity(p, p.id === State.myId ? "#38bdf8" : "#a78bfa", "🧍", false);

  drawFloats();
}

function drawEntity(ent, color, emoji, isMob) {
  const t = State.tile, px = ent.x*t, py = ent.y*t;
  // corpo
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(px + t/2, py + t/2, t*0.32, 0, Math.PI*2);
  ctx.fill();
  // nome
  ctx.fillStyle = "#e2e8f0";
  ctx.font = `${Math.max(9, t*0.26)}px system-ui`;
  ctx.textAlign = "center";
  ctx.fillText(ent.name, px + t/2, py + t*0.18);
  // barra de hp
  if (ent.max_hp) {
    const w = t*0.7, h = 4, bx = px + (t-w)/2, by = py + t*0.78;
    ctx.fillStyle = "#0a1122"; ctx.fillRect(bx, by, w, h);
    ctx.fillStyle = isMob ? "#f87171" : "#4ade80";
    ctx.fillRect(bx, by, w * Math.max(0, ent.hp/ent.max_hp), h);
  }
}

// textos flutuantes de dano
const floats = [];
function floatText(ent, txt, color) {
  if (!ent) return;
  floats.push({ x: ent.x, y: ent.y, txt, color, life: 1 });
}
function drawFloats() {
  const t = State.tile;
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    ctx.globalAlpha = f.life;
    ctx.fillStyle = f.color;
    ctx.font = `bold ${t*0.4}px system-ui`;
    ctx.textAlign = "center";
    ctx.fillText(f.txt, f.x*t + t/2, f.y*t + t*0.3 - (1-f.life)*20);
    ctx.globalAlpha = 1;
    f.life -= 0.03;
    if (f.life <= 0) floats.splice(i, 1);
  }
  if (floats.length) requestAnimationFrame(draw);
}

// ============================================================
//  Painéis laterais
// ============================================================
function renderPlayers() {
  $("pcount").textContent = State.players.size;
  $("players").innerHTML = [...State.players.values()].map(p => `
    <div class="row">
      <span class="n ${p.id===State.myId?'self':''}">${esc(p.name)}${p.id===State.myId?' (você)':''}</span>
      <span class="bar"><i style="width:${pct(p)}%"></i></span>
    </div>`).join("");
}
function renderMonsters() {
  const arr = [...State.monsters.values()];
  $("monsters").innerHTML = arr.length ? arr.map(m => `
    <div class="row">
      <span class="n">${esc(m.name)}</span>
      <span class="bar mob"><i style="width:${pct(m)}%"></i></span>
    </div>`).join("") : `<div class="pill">Nenhum monstro</div>`;
}
function renderInv() {
  $("inv").innerHTML = State.inventory.length ? State.inventory.map(it => `
    <div class="row">
      <span class="n">${esc(it.name)} <span class="pill">x${it.qty}</span></span>
      <button onclick="useItem('${esc(it.id)}')">Usar</button>
    </div>`).join("") : `<div class="pill">Vazio</div>`;
}

// ============================================================
//  Chat
// ============================================================
function chatMsg(d) {
  const sys = !d.id || d.name === "system";
  addChat(sys ? `<span class="system">${esc(d.text)}</span>`
              : `<span class="who">${esc(d.name)}:</span> ${esc(d.text)}`);
}
function sysMsg(text) { addChat(`<span class="system">${esc(text)}</span>`); }
function addChat(html) {
  const log = $("chatlog");
  const div = document.createElement("div");
  div.className = "msg"; div.innerHTML = html;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// ============================================================
//  Utils
// ============================================================
function showLogin() { $("login").style.display = "flex"; }
function hideLogin() { $("login").style.display = "none"; }
function pct(e) { return e.max_hp ? Math.max(0, Math.round(100*e.hp/e.max_hp)) : 100; }
function cheby(x1,y1,x2,y2){ return Math.max(Math.abs(x1-x2), Math.abs(y1-y2)); }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

// ---- bind UI ----
$("btnConnect").onclick = connect;
$("btnLogin").onclick = doLogin;
$("btnSay").onclick = doSay;
$("name").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
$("chatInput").addEventListener("keydown", e => { if (e.key === "Enter") doSay(); });
window.addEventListener("resize", () => { if (State.map){ fitCanvas(); draw(); } });
window.useItem = useItem;

// auto-conecta ao abrir (pra facilitar o teste)
connect();
</script>
</body>
</html>
